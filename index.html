<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주간 업무 체크리스트</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
  :root {
    --bg: #f7f7f5;
    --bg-sub: #f0efec;
    --surface: #ffffff;
    --surface-hover: #fafaf8;
    --border: #e5e3de;
    --border-strong: #d4d1ca;
    --ink: #1f1e1b;
    --ink-soft: #4a4843;
    --ink-muted: #8a8680;
    --ink-faint: #b5b0a7;

    --accent: #2a5d8f;
    --accent-soft: #e8f0f7;
    --green: #3d7a4a;
    --green-soft: #e5f0e7;
    --amber: #a86c1d;
    --amber-soft: #f5ecdc;
    --red: #a83838;
    --red-soft: #f5e5e5;

    --radius: 6px;
    --radius-lg: 8px;
    --shadow: 0 1px 2px rgba(0,0,0,0.04);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.55;
    min-height: 100vh;
    padding: 20px 24px 60px;
    -webkit-font-smoothing: antialiased;
  }

  .container { max-width: 1800px; margin: 0 auto; }

  /* === HEADER === */
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
    gap: 16px;
    flex-wrap: wrap;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-icon {
    width: 32px; height: 32px;
    background: var(--ink); color: var(--surface);
    border-radius: 7px;
    display: grid; place-items: center;
    font-weight: 700; font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
  }
  h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
  .sub-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--ink-muted);
    padding: 3px 8px; background: var(--bg-sub);
    border-radius: 4px; margin-left: 6px;
    letter-spacing: 0.02em;
  }
  .header-actions { display: flex; gap: 6px; }

  /* === BUTTONS === */
  .btn {
    font-family: inherit;
    font-size: 13px; font-weight: 500;
    padding: 6px 12px;
    border: 1px solid var(--border);
    background: var(--surface); color: var(--ink);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all .12s ease;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn:hover { background: var(--surface-hover); border-color: var(--border-strong); }
  .btn:active { transform: translateY(1px); }
  .btn-primary {
    background: var(--accent); color: white; border-color: var(--accent);
  }
  .btn-primary:hover { background: #224d78; border-color: #224d78; }
  .btn-ghost { border-color: transparent; background: transparent; }
  .btn-ghost:hover { background: var(--bg-sub); }
  .btn-sm { padding: 4px 10px; font-size: 12.5px; }

  /* === TABS === */
  .tabs {
    display: flex; gap: 2px;
    padding: 3px; background: var(--bg-sub);
    border-radius: var(--radius);
    margin-bottom: 18px;
    width: fit-content;
  }
  .tab {
    font-family: inherit;
    font-size: 13px;
    padding: 6px 14px;
    background: transparent;
    border: none; border-radius: 4px;
    color: var(--ink-muted);
    cursor: pointer; font-weight: 500;
    transition: all .12s;
  }
  .tab:hover { color: var(--ink-soft); }
  .tab.active {
    background: var(--surface); color: var(--ink);
    box-shadow: var(--shadow);
  }

  .view { display: none; }
  .view.active { display: block; }

  /* === DASHBOARD === */
  .dash-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
    transition: border-color .12s;
  }
  .stat-card:hover { border-color: var(--border-strong); }
  .stat-label {
    font-size: 12px; color: var(--ink-muted);
    font-weight: 500; margin-bottom: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .stat-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ink-faint); }
  .stat-dot.accent { background: var(--accent); }
  .stat-dot.green { background: var(--green); }
  .stat-dot.amber { background: var(--amber); }
  .stat-value {
    font-size: 26px; font-weight: 600;
    line-height: 1; letter-spacing: -0.02em;
    font-family: 'JetBrains Mono', monospace;
  }
  .stat-sub { font-size: 11.5px; color: var(--ink-muted); margin-top: 4px; }

  .dash-two {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  @media (max-width: 900px) { .dash-two { grid-template-columns: 1fr; } }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  .panel-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    justify-content: space-between;
  }
  .panel-title {
    font-size: 13px; font-weight: 600;
    display: flex; align-items: center; gap: 8px;
  }
  .panel-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--ink-muted);
    background: var(--bg-sub);
    padding: 2px 7px; border-radius: 10px;
  }
  .panel-body { padding: 4px 0; max-height: 420px; overflow-y: auto; }

  .todo-list { list-style: none; }
  .todo-list li {
    padding: 8px 16px;
    font-size: 13px;
    display: flex; gap: 10px;
    align-items: flex-start;
    flex-wrap: wrap;
    transition: background .12s;
  }
  .todo-list li:hover { background: var(--surface-hover); }
  .todo-list li + li { border-top: 1px solid var(--border); }
  .todo-list .site { font-weight: 600; }
  .todo-list .task { color: var(--ink-muted); flex: 1; min-width: 140px; font-size: 12.5px; }
  .empty {
    color: var(--ink-faint);
    font-size: 13px;
    padding: 24px 16px;
    text-align: center;
  }
  #checklist-body > .empty { grid-column: 1 / -1; }

  /* === TOOLBAR === */
  .toolbar {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 12px;
    gap: 12px; flex-wrap: wrap;
  }
  .toolbar-left { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .week-selector select {
    font-family: inherit;
    font-size: 13.5px; font-weight: 500;
    padding: 6px 28px 6px 12px;
    border: 1px solid var(--border);
    background: var(--surface); color: var(--ink);
    border-radius: var(--radius);
    cursor: pointer;
    min-width: 160px;
    -webkit-appearance: none; appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%238a8680' stroke-width='1.5' fill='none' stroke-linecap='round'/></svg>");
    background-repeat: no-repeat;
    background-position: right 10px center;
  }
  .week-selector select:hover { border-color: var(--border-strong); }

  .search-box { position: relative; flex: 1; max-width: 320px; }
  .search-box input {
    font-family: inherit;
    width: 100%;
    padding: 6px 12px 6px 32px;
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: var(--radius);
    font-size: 13px; color: var(--ink);
  }
  .search-box input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .search-box::before {
    content: '';
    position: absolute; left: 10px; top: 50%;
    transform: translateY(-50%);
    width: 13px; height: 13px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='none' stroke='%238a8680' stroke-width='1.8'><circle cx='7' cy='7' r='5'/><path d='M14 14l-3-3' stroke-linecap='round'/></svg>");
    background-size: contain;
  }

  /* === FILTERS === */
  .filter-row {
    display: flex;
    gap: 20px;
    margin-bottom: 14px;
    flex-wrap: wrap;
    align-items: center;
    padding: 8px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .filter-group { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
  .filter-label {
    font-size: 11px;
    color: var(--ink-muted);
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-right: 4px;
  }
  .chip {
    font-family: inherit;
    font-size: 12px; font-weight: 500;
    padding: 3px 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: 4px;
    cursor: pointer;
    color: var(--ink-soft);
    transition: all .12s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .chip:hover { background: var(--bg-sub); }
  .chip.active {
    background: var(--ink); color: var(--surface);
    border-color: var(--ink);
  }
  .chip-add { border-style: dashed; color: var(--ink-muted); }
  .cat-dot {
    width: 8px; height: 8px;
    border-radius: 2px;
    background: var(--cat);
    flex-shrink: 0;
  }

  /* === ADD ROW (상단) === */
  .add-row {
    display: grid;
    grid-template-columns: auto auto 1fr auto auto;
    gap: 10px;
    align-items: center;
    padding: 12px 14px;
    background: var(--accent-soft);
    border: 1px solid var(--accent);
    border-left-width: 3px;
    border-radius: var(--radius-lg);
    margin-bottom: 14px;
  }
  .add-row-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    display: flex; align-items: center; gap: 6px;
  }
  .add-row input {
    font-family: inherit; font-size: 13.5px;
    padding: 6px 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: var(--radius);
    color: var(--ink);
  }
  .add-row input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(42,93,143,0.15);
  }
  .add-row input.site-input { min-width: 160px; font-weight: 600; }
  .add-row input.task-input { width: 100%; }
  .add-row select {
    font-family: inherit; font-size: 12.5px;
    font-weight: 500;
    padding: 5px 26px 5px 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: var(--radius);
    cursor: pointer;
    -webkit-appearance: none; appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%238a8680' stroke-width='1.5' fill='none' stroke-linecap='round'/></svg>");
    background-repeat: no-repeat;
    background-position: right 8px center;
  }
  @media (max-width: 700px) {
    .add-row { grid-template-columns: 1fr 1fr; }
    .add-row-label { grid-column: 1 / -1; }
  }

  /* === LIST (카드 2열 그리드) === */
  .checklist {
    /* 바깥 래퍼 - 배경/테두리 없음 */
  }
  #checklist-body {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }
  @media (max-width: 900px) {
    #checklist-body { grid-template-columns: 1fr; }
  }

  /* 컬럼 헤더는 카드 구조에서는 숨김 */
  .list-header { display: none; }

  .check-item {
    display: grid;
    grid-template-rows: auto auto 1fr auto;
    gap: 10px;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    transition: all .12s;
    position: relative;
    min-width: 0;
  }
  .check-item:hover {
    border-color: var(--border-strong);
    box-shadow: 0 2px 8px rgba(0,0,0,0.03);
  }
  .check-item.hold {
    background: var(--amber-soft);
    border-color: var(--amber);
  }
  .check-item.hold::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; background: var(--amber);
    border-radius: var(--radius-lg) 0 0 var(--radius-lg);
  }
  .check-item.all-done {
    background: var(--bg-sub);
    opacity: 0.7;
  }
  .check-item.all-done .site { text-decoration: line-through; color: var(--ink-muted); }

  /* 카드 내부 1행: 카테고리 + 액션 */
  .card-row-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    min-width: 0;
  }
  /* 2행: 현장명 */
  .card-row-site { min-width: 0; }
  /* 3행: 진행 내역 */
  .card-row-memo { min-width: 0; }
  /* 4행: 다음 할 일 */
  .card-row-next { min-width: 0; }

  .card-section-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--ink-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 5px;
    display: block;
  }

  /* 카테고리 셀 */
  .col-cat { display: flex; align-items: center; min-width: 0; }
  .cat-tag {
    font-size: 11px; font-weight: 600;
    padding: 2px 8px;
    border-radius: 3px;
    background: var(--cat-bg);
    color: var(--cat-ink);
    white-space: nowrap;
    cursor: pointer; user-select: none;
    display: inline-flex; align-items: center; gap: 5px;
    height: 20px; letter-spacing: 0.01em;
    transition: filter .12s;
  }
  .cat-tag:hover { filter: brightness(0.95); }
  .cat-tag::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--cat); border-radius: 50%;
    flex-shrink: 0;
  }

  /* 현장명 셀 */
  .col-site { min-width: 0; }
  .site {
    font-weight: 600;
    font-size: 15px;
    line-height: 1.35;
    word-break: keep-all;
  }
  .site[contenteditable="true"]:focus,
  .memo-history[contenteditable="true"]:focus {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
    background: var(--surface);
    border-radius: 3px;
  }

  /* 메모/히스토리 셀 */
  .col-memo { min-width: 0; }
  .memo-history {
    font-size: 12.5px;
    color: var(--ink-soft);
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: keep-all;
    min-height: 20px;
    padding: 4px 6px;
    border-radius: 4px;
    background: var(--bg-sub);
  }
  .memo-history:empty::before {
    content: '진행 내용 기록…';
    color: var(--ink-faint);
  }
  .memo-history:focus {
    background: var(--surface);
  }

  /* 다음 할 일 셀 (여러 체크박스 리스트) */
  .col-next { min-width: 0; }
  .next-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .next-item {
    display: grid;
    grid-template-columns: 20px 1fr auto;
    gap: 8px;
    align-items: center;
    padding: 5px 8px;
    background: var(--accent-soft);
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    transition: all .12s;
    min-height: 30px;
  }
  .next-item.done {
    background: var(--green-soft);
    border-color: var(--green);
  }
  .next-check {
    appearance: none;
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border: 1.5px solid var(--accent);
    background: var(--surface);
    border-radius: 4px;
    cursor: pointer;
    display: grid; place-items: center;
    flex-shrink: 0;
    margin: 0;
    transition: all .12s;
  }
  .next-check:hover { border-color: #224d78; }
  .next-check:checked {
    background: var(--green);
    border-color: var(--green);
  }
  .next-check:checked::after {
    content: '';
    width: 9px; height: 5px;
    border-left: 2px solid white;
    border-bottom: 2px solid white;
    transform: translateY(-1px) rotate(-45deg);
  }

  .next-text {
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    outline: none;
    min-width: 0;
    word-break: keep-all;
    line-height: 1.4;
  }
  .next-item.done .next-text {
    color: var(--ink-muted);
    text-decoration: line-through;
    text-decoration-color: var(--ink-faint);
    font-weight: 400;
  }
  .next-text[contenteditable="true"]:focus {
    background: var(--surface);
    border-radius: 3px;
    padding: 1px 3px;
  }
  .next-text:empty::before {
    content: '할 일 입력…';
    color: var(--ink-faint);
    font-weight: 400;
  }

  .next-meta {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }
  .next-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    color: var(--green);
    font-weight: 500;
    white-space: nowrap;
  }
  .next-del {
    width: 18px; height: 18px;
    border: none;
    background: transparent;
    color: var(--ink-faint);
    cursor: pointer;
    border-radius: 3px;
    display: grid; place-items: center;
    font-size: 12px;
    opacity: 0;
    transition: all .12s;
  }
  .next-item:hover .next-del { opacity: 0.7; }
  .next-del:hover {
    opacity: 1 !important;
    color: var(--red);
    background: var(--red-soft);
  }

  .next-add {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 8px;
    background: transparent;
    border: 1px dashed var(--border-strong);
    border-radius: var(--radius);
    color: var(--ink-muted);
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    transition: all .12s;
    width: 100%;
    justify-content: flex-start;
  }
  .next-add:hover {
    color: var(--accent);
    border-color: var(--accent);
    background: var(--accent-soft);
  }

  .next-empty {
    font-size: 12px;
    color: var(--ink-faint);
    padding: 4px 0;
  }

  /* 액션 셀 */
  .col-actions {
    display: flex; gap: 2px;
    flex-shrink: 0;
  }
  .icon-btn {
    width: 26px; height: 26px;
    border: none; background: none;
    color: var(--ink-muted);
    cursor: pointer;
    border-radius: 4px;
    display: grid; place-items: center;
    font-size: 13px;
    transition: all .12s;
  }
  .icon-btn:hover { background: var(--bg-sub); color: var(--ink); }
  .icon-btn.danger:hover { color: var(--red); background: var(--red-soft); }

  /* === SITE VIEW === */
  .site-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 12px;
  }
  .site-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    transition: border-color .12s;
  }
  .site-card:hover { border-color: var(--border-strong); }
  .site-head {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface-hover);
  }
  .site-head h3 {
    font-size: 14.5px; font-weight: 600;
    margin-bottom: 6px;
    line-height: 1.3;
    display: flex; align-items: center; gap: 8px;
    flex-wrap: wrap;
  }
  .site-meta {
    font-size: 11.5px; color: var(--ink-muted);
    display: flex; gap: 10px;
    font-family: 'JetBrains Mono', monospace;
  }
  .site-timeline {
    list-style: none;
    max-height: 300px;
    overflow-y: auto;
    padding: 4px 0;
  }
  .site-timeline li {
    padding: 7px 14px;
    font-size: 12.5px;
    display: flex; gap: 12px;
    transition: background .12s;
  }
  .site-timeline li + li { border-top: 1px solid var(--border); }
  .site-timeline li:hover { background: var(--surface-hover); }
  .site-timeline .week-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 600;
    color: var(--ink-muted);
    flex-shrink: 0; min-width: 78px;
    padding-top: 1px;
  }
  .site-timeline .entry {
    color: var(--ink-soft);
    flex: 1; line-height: 1.5;
  }

    state.weekOrder.forEach(w => {

        // 과거 완료 항목들을 모아서 memo에 붙일 라인으로 만듦
        const completedLines = [];

        // 이전 log (문자열 배열)
        if (Array.isArray(t.log)) {
          t.log.forEach(entry => {
            const text = (typeof entry === 'string') ? entry : (entry && entry.text) || '';
            if (text) completedLines.push(`✓ ${text}`);
          });
        }

        // 기존 nexts 중 done:true인 것들 (이전 버전 저장 데이터 호환)
        if (Array.isArray(t.nexts)) {
          t.nexts.forEach(n => {
            if (n && n.done && n.text) {
              const stamp = n.doneAt ? formatDoneAt(n.doneAt) : null;
              completedLines.push(stamp ? `✓ [${stamp}] ${n.text}` : `✓ ${n.text}`);
            }
          });
          // nexts는 미완료만 남기고, 각 항목은 새 스키마로 정규화
          t.nexts = t.nexts.filter(n => n && !n.done).map(n => ({
            id: n.id || uid(),
            text: n.text || ''
          }));
        } else {

        }

        // 이전 next (문자열 1개, 미완료) → nexts 앞에 추가
        if (typeof t.next === 'string' && t.next.trim()) {
          t.nexts.unshift({ id: uid(), text: t.next.trim() });
        }

        // 완료된 줄들을 memo 뒤에 병합
        if (completedLines.length > 0) {
          const existing = (t.memo || '').trimEnd();
          t.memo = existing ? (existing + '\n' + completedLines.join('\n')) : completedLines.join('\n');
        }

        // 구 필드 정리
        delete t.next;
        delete t.log;

  function catStyle(catName) {
    const c = state.categories[catName] || state.categories['기타'];
    return `--cat:${c.color}; --cat-bg:${c.bg}; --cat-ink:${c.ink};`;
  }

  function render() {
    renderDashboard();
    renderWeekSelector();
    renderCategoryFilter();
    renderNewTaskCat();
    renderChecklist();
    renderSiteView();
  }

  function renderDashboard() {
    const all = getAllTasks();
    document.getElementById('stat-total').textContent = all.length;

    // 완료 판정 헬퍼: t.done이 true거나, nexts가 비고 memo에 기록이 있음
    const isAllDone = (t) => {
      const nx = Array.isArray(t.nexts) ? t.nexts : [];
      return t.done || (nx.length === 0 && (t.memo && t.memo.trim().length > 0));
    };

    const lastWeek = state.weekOrder[state.weekOrder.length - 1];
    const lastTasks = state.weeks[lastWeek] || [];
    const open = lastTasks.filter(t => !isAllDone(t) && !t.hold);
    const done = lastTasks.filter(t => isAllDone(t));
    document.getElementById('stat-thisweek').textContent = open.length;
    document.getElementById('stat-thisweek-label').textContent = lastWeek || '—';
    document.getElementById('stat-done').textContent = done.length;
    const sites = new Set(all.map(t => t.site).filter(Boolean));
    document.getElementById('stat-sites').textContent = sites.size;

    const todoEl = document.getElementById('this-week-todos');
    document.getElementById('remaining-count').textContent = open.length;
    if (open.length === 0) {
      todoEl.innerHTML = '<div class="empty">이번주 남은 일이 없습니다</div>';
    } else {
      todoEl.innerHTML = open.map(t => {
        const nx = Array.isArray(t.nexts) ? t.nexts : [];
        const firstText = nx.length > 0 ? nx[0].text : '';
        const moreCount = nx.length > 1 ? ` <span style="color:var(--ink-faint);">+${nx.length-1}</span>` : '';
        const taskText = firstText || t.memo || '—';
        return `
          <li>
            <span class="cat-tag" style="${catStyle(t.cat)}">${escapeHtml(t.cat)}</span>
            <span class="site">${escapeHtml(t.site)}</span>
            <span class="task">${escapeHtml(taskText)}${moreCount}</span>
          </li>
        `;
      }).join('');
    }

    const holdEl = document.getElementById('hold-items');
    const holdMap = {};
    all.filter(t => t.hold).forEach(t => { holdMap[t.site] = t; });
    const hold = Object.values(holdMap);
    document.getElementById('hold-count').textContent = hold.length;
    if (hold.length === 0) {
      holdEl.innerHTML = '<div class="empty">보류 항목이 없습니다</div>';
    } else {
      holdEl.innerHTML = hold.map(t => `
        <li>
          <span class="cat-tag" style="${catStyle(t.cat)}">${escapeHtml(t.cat)}</span>
          <span class="site">${escapeHtml(t.site)}</span>
          <span class="task">${escapeHtml(t.memo || '')}</span>
        </li>
      `).join('');
    }
  }

  function renderWeekSelector() {
    const sel = document.getElementById('week-select');
    sel.innerHTML = state.weekOrder.map(w =>
      `<option value="${escapeHtml(w)}" ${w === state.currentWeek ? 'selected' : ''}>${escapeHtml(w)}</option>`
    ).join('');
  }

  function renderNewTaskCat() {
    const sel = document.getElementById('new-cat-select');
    const cats = Object.keys(state.categories);
    sel.innerHTML = cats.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
  }

  function renderCategoryFilter() {
    const cats = Object.keys(state.categories);
    const build = (includeAdd) => `
      <span class="filter-label">카테고리</span>
      <button class="chip ${state.catFilter==='all'?'active':''}" data-cat="all">전체</button>
      ${cats.map(c => {
        const col = state.categories[c].color;
        return `<button class="chip ${state.catFilter===c?'active':''}" data-cat="${escapeHtml(c)}"><span class="cat-dot" style="--cat:${col};"></span>${escapeHtml(c)}</button>`;
      }).join('')}
      ${includeAdd ? `<button class="chip chip-add" data-add-cat="1">+ 추가</button>` : ''}
    `;
    document.getElementById('cat-filter-group').innerHTML = build(true);
    document.getElementById('site-cat-filter').innerHTML = build(false);

    document.querySelectorAll('#cat-filter-group [data-cat], #site-cat-filter [data-cat]').forEach(el => {
      el.addEventListener('click', () => {
        state.catFilter = el.dataset.cat;
        renderCategoryFilter();
        renderChecklist();
        renderSiteView();
      });
    });
    document.querySelectorAll('[data-add-cat]').forEach(el => {
      el.addEventListener('click', openCatModal);
    });
  }

  function renderChecklist() {
    const body = document.getElementById('checklist-body');
    const tasks = state.weeks[state.currentWeek] || [];
    const search = (document.getElementById('search-input').value || '').toLowerCase();

    const filtered = tasks.filter(t => {
      const nexts = Array.isArray(t.nexts) ? t.nexts : [];
      // "완료" 정의: t.done이 true거나, 할 일이 비었고 진행 내역이 있음
      const allDone = t.done || (nexts.length === 0 && (t.memo && t.memo.trim().length > 0));
      if (state.filter === 'open' && (allDone || t.hold)) return false;
      if (state.filter === 'done' && !allDone) return false;
      if (state.filter === 'hold' && !t.hold) return false;
      if (state.catFilter !== 'all' && t.cat !== state.catFilter) return false;
      if (search) {
        const nextBlob = nexts.map(n => n.text).join(' ');
        const blob = `${t.site} ${t.memo} ${nextBlob} ${t.cat}`.toLowerCase();
        if (!blob.includes(search)) return false;
      }
      return true;
    });

    if (filtered.length === 0) {
      body.innerHTML = '<div class="empty">조건에 맞는 업무가 없습니다</div>';
      return;
    }

    body.innerHTML = filtered.map(t => {
      const nexts = Array.isArray(t.nexts) ? t.nexts : [];
      // nexts는 이제 "미완료"만 담김 (체크하면 memo로 이동)
      const hasNoNexts = nexts.length === 0;
      const allDone = t.done || (hasNoNexts && (t.memo && t.memo.trim().length > 0));

      const nextsHtml = hasNoNexts
        ? '<div class="next-empty">등록된 할 일이 없습니다</div>'
        : `<div class="next-list">
            ${nexts.map(n => `
              <div class="next-item" data-next-id="${n.id}">
                <input type="checkbox" class="next-check" data-action="next-toggle" data-id="${t.id}" data-next-id="${n.id}">
                <div class="next-text" contenteditable="true" data-field="next-text" data-id="${t.id}" data-next-id="${n.id}">${escapeHtml(n.text)}</div>
                <div class="next-meta">
                  <button class="next-del" data-action="next-del" data-id="${t.id}" data-next-id="${n.id}" title="삭제">✕</button>
                </div>
              </div>
            `).join('')}
          </div>`;

      return `
        <div class="check-item ${allDone ? 'all-done' : ''} ${t.hold ? 'hold' : ''}" data-id="${t.id}">
          <div class="card-row-top">
            <div class="col-cat">
              <span class="cat-tag" style="${catStyle(t.cat)}" data-action="cat" data-id="${t.id}">${escapeHtml(t.cat)}</span>
            </div>
            <div class="col-actions">
              <button class="icon-btn" data-action="hold" data-id="${t.id}" title="${t.hold?'보류 해제':'보류 처리'}">${t.hold?'↺':'⏸'}</button>
              <button class="icon-btn" data-action="done-toggle" data-id="${t.id}" title="${allDone?'완료 해제':'전체 완료 처리'}">${allDone?'↶':'✓'}</button>
              <button class="icon-btn danger" data-action="del" data-id="${t.id}" title="삭제">✕</button>
            </div>
          </div>
          <div class="card-row-site col-site">
            <div class="site" contenteditable="true" data-field="site" data-id="${t.id}">${escapeHtml(t.site)}</div>
          </div>
          <div class="card-row-memo col-memo">
            <span class="card-section-label">진행 내역</span>
            <div class="memo-history" contenteditable="true" data-field="memo" data-id="${t.id}">${escapeHtml(t.memo)}</div>
          </div>
          <div class="card-row-next col-next">
            <span class="card-section-label">다음 할 일</span>
            ${nextsHtml}
            <button class="next-add" data-action="next-add" data-id="${t.id}" style="margin-top:4px;">+ 할 일 추가</button>
          </div>
        </div>
      `;
    }).join('');

    body.querySelectorAll('[data-action]').forEach(el => {
      el.addEventListener('click', (e) => {
        const action = el.dataset.action;
        const id = el.dataset.id;
        const nextId = el.dataset.nextId;
        if (action === 'next-toggle') toggleNextDone(id, nextId, el.checked);
        else if (action === 'next-add') addNextItem(id);
        else if (action === 'next-del') deleteNextItem(id, nextId);
        else if (action === 'done-toggle') toggleDone(id);
        else if (action === 'hold') toggleHold(id);
        else if (action === 'del') deleteTask(id);
        else if (action === 'cat') showCatPopup(e, id);
      });
    });

    body.querySelectorAll('[contenteditable]').forEach(el => {
      el.addEventListener('blur', (e) => {
        const id = e.target.dataset.id;
        const field = e.target.dataset.field;
        const task = state.weeks[state.currentWeek].find(t => t.id === id);
        if (!task) return;
        if (field === 'next-text') {
          const nextId = e.target.dataset.nextId;
          const n = (task.nexts || []).find(x => x.id === nextId);
          if (n) {
            const newText = e.target.innerText.trim();
            if (newText !== n.text) {
              n.text = newText;
              save();
              renderDashboard();
            }
          }
        } else if (field === 'site' || field === 'memo') {
          task[field] = e.target.innerText.trim();
          save();
          renderDashboard();
        }
      });
      el.addEventListener('keydown', (e) => {
        const field = e.target.dataset.field;
        if (e.key === 'Enter' && !e.shiftKey && field !== 'memo') {
          e.preventDefault();
          e.target.blur();
        }
      });
    });
  }

  function renderSiteView() {
    const grid = document.getElementById('site-grid');
    const search = (document.getElementById('site-search').value || '').toLowerCase();
    const siteMap = {};

    state.weekOrder.forEach(week => {
      (state.weeks[week] || []).forEach(t => {
        if (!t.site) return;
        if (state.catFilter !== 'all' && t.cat !== state.catFilter) return;
        if (!siteMap[t.site]) siteMap[t.site] = [];
        siteMap[t.site].push({ ...t, week });
      });
    });

    let sites = Object.entries(siteMap);
    if (search) sites = sites.filter(([n]) => n.toLowerCase().includes(search));
    sites.sort((a,b) => b[1].length - a[1].length);

    if (sites.length === 0) {
      grid.innerHTML = '<div class="empty">해당 현장이 없습니다</div>';
      return;
    }

    grid.innerHTML = sites.map(([name, entries]) => {
      const latest = entries[entries.length - 1];
      const isEntryDone = (e) => {
        const nx = Array.isArray(e.nexts) ? e.nexts : [];
        return e.done || (nx.length === 0 && (e.memo && e.memo.trim().length > 0));
      };
      const openCount = entries.filter(e => !isEntryDone(e) && !e.hold).length;
      return `
        <div class="site-card">
          <div class="site-head">
            <h3>${escapeHtml(name)} <span class="cat-tag" style="${catStyle(latest.cat)}">${escapeHtml(latest.cat)}</span></h3>
            <div class="site-meta">
              <span>${entries.length}회 기록</span>
              <span>·</span>
              <span>진행 ${openCount}</span>
              <span>·</span>
              <span>최근 ${escapeHtml(latest.week)}</span>
            </div>
          </div>
          <ul class="site-timeline">
            ${entries.map(e => {
              const allDone = isEntryDone(e);
              const status = allDone ? 'done' : e.hold ? 'hold' : 'open';
              const statusSym = allDone ? '✓' : e.hold ? '⏸' : '○';
              const nx = Array.isArray(e.nexts) ? e.nexts : [];
              const pendingTxt = nx.length > 0
                ? `<br><span style="color:var(--accent); font-weight:500;">→ ${nx.map(n => escapeHtml(n.text)).join(' / ')}</span>`
                : '';
              return `
                <li>
                  <span class="week-tag">${escapeHtml(e.week)}</span>
                  <span class="entry">
                    <span class="status-ind ${status}">${statusSym}</span>
                    ${escapeHtml(e.memo || '(내용없음)')}
                    ${pendingTxt}
                  </span>
                </li>
              `;
            }).join('')}
          </ul>
        </div>
      `;
    }).join('');
  }

  function getAllTasks() {
    const all = [];
    state.weekOrder.forEach(w => {
      (state.weeks[w] || []).forEach(t => all.push({...t, week: w}));
    });
    return all;
  }

  // === 날짜 포맷팅 ===
  function formatDoneAt(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    if (isNaN(d.getTime())) return '';
    const pad = (n) => String(n).padStart(2, '0');
    const now = new Date();
    const sameYear = d.getFullYear() === now.getFullYear();
    if (sameYear) {
      return `${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }
    return `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  // === 다음 할 일 관리 ===
  function toggleNextDone(taskId, nextId, checked) {
    const t = state.weeks[state.currentWeek].find(x => x.id === taskId);
    if (!t || !Array.isArray(t.nexts)) return;
    const n = t.nexts.find(x => x.id === nextId);
    if (!n) return;
    if (!checked) return; // 체크 해제는 무시 (이미 이동됨)

    // 체크한 항목을 진행 내역(memo)으로 이동
    const now = new Date();
    const stamp = formatDoneAt(now.toISOString());
    const text = (n.text || '').trim();
    if (!text) {
      // 빈 항목은 그냥 제거
      t.nexts = t.nexts.filter(x => x.id !== nextId);
      save();
      render();
      return;
    }
    const line = `✓ [${stamp}] ${text}`;
    t.memo = t.memo ? (t.memo.trimEnd() + '\n' + line) : line;
    t.nexts = t.nexts.filter(x => x.id !== nextId);
    save();
    render();
    toast('✓ 진행 내역으로 이동됨');
  }

  function addNextItem(taskId, initialText = '') {
    const t = state.weeks[state.currentWeek].find(x => x.id === taskId);
    if (!t) return;
    if (!Array.isArray(t.nexts)) t.nexts = [];
    const newItem = { id: uid(), text: initialText };
    t.nexts.push(newItem);
    save();
    render();
    // 방금 추가한 항목에 포커스
    setTimeout(() => {
      const el = document.querySelector(`.next-text[data-next-id="${newItem.id}"]`);
      if (el) {
        el.focus();
        const range = document.createRange();
        range.selectNodeContents(el);
        range.collapse(false);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
      }
    }, 50);
  }

  function deleteNextItem(taskId, nextId) {
    const t = state.weeks[state.currentWeek].find(x => x.id === taskId);
    if (!t || !Array.isArray(t.nexts)) return;
    t.nexts = t.nexts.filter(n => n.id !== nextId);
    save();
    render();
  }

  function toggleDone(id) {
    const t = state.weeks[state.currentWeek].find(x => x.id === id);
    if (!t) return;
    t.done = !t.done;
    if (t.done) t.hold = false;
    save(); render();
  }
  function toggleHold(id) {
    const t = state.weeks[state.currentWeek].find(x => x.id === id);
    if (!t) return;
    t.hold = !t.hold;
    if (t.hold) t.done = false;
    save(); render();
    toast(t.hold ? '보류 처리됨' : '보류 해제됨');
  }
  function deleteTask(id) {
    if (!confirm('이 업무를 삭제할까요?')) return;
    state.weeks[state.currentWeek] = state.weeks[state.currentWeek].filter(t => t.id !== id);
    save(); render();
  }

  function addTaskFromTop() {
    if (!state.currentWeek) { toast('주차를 먼저 선택해주세요'); return; }
    const cat = document.getElementById('new-cat-select').value;
    const siteEl = document.getElementById('new-site-input');
    const taskEl = document.getElementById('new-task-input');
    const site = siteEl.value.trim();
    const task = taskEl.value.trim();
    if (!site) { toast('현장명을 입력해주세요'); siteEl.focus(); return; }

    const nexts = [];
    if (task) {
      nexts.push({ id: uid(), text: task });
    }
    const newTask = {
      id: uid(),
      cat, site,
      memo: '',
      nexts,
      done: false, hold: false
    };
    state.weeks[state.currentWeek].unshift(newTask);
    save();
    siteEl.value = '';
    taskEl.value = '';
    siteEl.focus();
    render();
    toast('업무 추가됨');
  }

  function showCatPopup(e, taskId) {
    e.stopPropagation();
    editingTaskId = taskId;
    const popup = document.getElementById('cat-popup');
    const cats = Object.keys(state.categories);
    popup.innerHTML = cats.map(c => {
      const col = state.categories[c].color;
      return `<button class="cat-pick-btn" style="--pick-color:${col};" data-cat="${escapeHtml(c)}">${escapeHtml(c)}</button>`;
    }).join('') + `<div class="divider"></div><button class="add-cat" id="add-cat-btn">+ 새 카테고리</button>`;

    popup.querySelectorAll('[data-cat]').forEach(btn => {
      btn.addEventListener('click', () => setCategory(btn.dataset.cat));
    });
    popup.querySelector('#add-cat-btn').addEventListener('click', openCatModal);

    const rect = e.target.getBoundingClientRect();
    popup.style.top = (rect.bottom + window.scrollY + 4) + 'px';
    popup.style.left = (rect.left + window.scrollX) + 'px';
    popup.classList.add('active');
  }
  function setCategory(cat) {
    if (!editingTaskId) return;
    const t = state.weeks[state.currentWeek].find(x => x.id === editingTaskId);
    if (t) { t.cat = cat; save(); render(); }
    document.getElementById('cat-popup').classList.remove('active');
    editingTaskId = null;
  }
  document.addEventListener('click', (e) => {
    const popup = document.getElementById('cat-popup');
    if (!popup.contains(e.target) && e.target.dataset.action !== 'cat') {
      popup.classList.remove('active');
    }
  });

  function openWeekModal() { document.getElementById('week-modal').classList.add('active'); document.getElementById('new-week-name').focus(); }
  function closeWeekModal() { document.getElementById('week-modal').classList.remove('active'); document.getElementById('new-week-name').value = ''; }
  function createWeek() {
    const name = document.getElementById('new-week-name').value.trim();
    if (!name) { toast('이름을 입력해주세요'); return; }
    if (state.weeks[name]) { toast('이미 있는 주차입니다'); return; }
    state.weeks[name] = [];
    state.weekOrder.push(name);
    state.currentWeek = name;
    save(); render(); closeWeekModal();
    toast(`${name} 추가됨`);
  }

  function openCatModal() {
    document.getElementById('cat-modal').classList.add('active');
    document.getElementById('cat-popup').classList.remove('active');
    tempColor = COLOR_PALETTE[0];
    renderColorPicker();
    document.getElementById('new-cat-name').focus();
  }
  function closeCatModal() {
    document.getElementById('cat-modal').classList.remove('active');
    document.getElementById('new-cat-name').value = '';
    tempColor = null;
  }
  function renderColorPicker() {
    const picker = document.getElementById('color-picker');
    picker.innerHTML = COLOR_PALETTE.map(p => `
      <button class="cat-pick-btn ${tempColor && tempColor.color===p.color?'selected':''}" style="--pick-color:${p.color};" data-color="${p.color}">${p.name}</button>
    `).join('');
    picker.querySelectorAll('[data-color]').forEach(btn => {
      btn.addEventListener('click', () => {
        tempColor = COLOR_PALETTE.find(p => p.color === btn.dataset.color);
        renderColorPicker();
      });
    });
  }
  function createCategory() {
    const name = document.getElementById('new-cat-name').value.trim();
    if (!name) { toast('이름을 입력해주세요'); return; }
    if (state.categories[name]) { toast('이미 있는 카테고리입니다'); return; }
    state.categories[name] = { color: tempColor.color, bg: tempColor.bg, ink: tempColor.ink };
    save(); render(); closeCatModal();
    toast(`${name} 카테고리 추가됨`);
  }

  function exportData() {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `업무체크리스트-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    toast('백업 파일 다운로드');
  }
  function importData(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.weeks || !data.weekOrder) throw 0;
        if (!confirm('기존 데이터를 덮어쓸까요?')) return;
        state = { ...state, ...data };
        save(); render();
        toast('불러오기 완료');
      } catch(err) { toast('파일을 읽을 수 없습니다'); }
    };
    reader.readAsText(file);
    e.target.value = '';
  }

  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 1800);
  }

  function escapeHtml(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // 이벤트
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('view-' + tab.dataset.view).classList.add('active');
    });
  });

  document.getElementById('week-select').addEventListener('change', (e) => {
    state.currentWeek = e.target.value;
    save();
    renderChecklist();
  });

  document.getElementById('search-input').addEventListener('input', renderChecklist);
  document.getElementById('site-search').addEventListener('input', renderSiteView);

  document.querySelectorAll('.filter-row .chip[data-filter]').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.filter-row .chip[data-filter]').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      state.filter = chip.dataset.filter;
      renderChecklist();
    });
  });

  // 상단 추가 행 — 엔터로도 추가
  ['new-site-input', 'new-task-input'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); addTaskFromTop(); }
    });
  });

  ['week-modal', 'cat-modal'].forEach(id => {
    document.getElementById(id).addEventListener('click', (e) => {
      if (e.target.id === id) {
        if (id === 'week-modal') closeWeekModal(); else closeCatModal();
      }
    });
  });

  document.getElementById('btn-export').onclick = exportData;
  document.getElementById('import-file').onchange = importData;
  document.getElementById('btn-new-week').onclick = openWeekModal;
  document.getElementById('btn-close-week').onclick = closeWeekModal;
  document.getElementById('btn-create-week').onclick = createWeek;
  document.getElementById('btn-close-cat').onclick = closeCatModal;
  document.getElementById('btn-create-cat').onclick = createCategory;
  document.getElementById('btn-add-task').onclick = addTaskFromTop;

  const d = new Date();
  document.getElementById('today-date').textContent =
    `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;

  // 비동기 로드 + 실시간 동기화
  (async () => {
    await load();
    render();

    // 실시간 동기화: 다른 기기에서 변경되면 자동 반영
    DOC_REF.onSnapshot((snap) => {
      if (!snap.exists) return;
      const data = snap.data();
      // 자기 자신이 방금 저장한 것은 무시 (updatedAt 비교는 생략, 중요한 건 다른 기기에서 온 것)
      isApplyingRemote = true;
      state = { ...state, ...data };
      // 카테고리 포맷 호환
      Object.keys(state.categories || {}).forEach(k => {
        if (typeof state.categories[k] === 'string') {
          const c = state.categories[k];
          state.categories[k] = { color: c, bg: c + '22', ink: c };
        }
      });
      render();
      isApplyingRemote = false;
    }, (err) => {
      console.error('실시간 동기화 오류:', err);
    });
  })();
</script>
</body>
</html>
